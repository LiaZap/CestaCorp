version: "3.9"

# Para EasyPanel: criar os três serviços (app, postgres, mongo) e
# apontar variáveis de ambiente via painel. Este compose serve para rodar
# local e como referência de topologia.

services:
  app:
    build: .
    container_name: cestacorp-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      MONGODB_URI: ${MONGODB_URI}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # NIBO
      NIBO_API_URL: ${NIBO_API_URL}
      NIBO_TOKEN: ${NIBO_TOKEN}
      NIBO_WEBHOOK_SECRET: ${NIBO_WEBHOOK_SECRET}
      # Digisac
      DIGISAC_API_URL: ${DIGISAC_API_URL}
      DIGISAC_TOKEN: ${DIGISAC_TOKEN}
      DIGISAC_SERVICE_ID: ${DIGISAC_SERVICE_ID}
      DIGISAC_WEBHOOK_SECRET: ${DIGISAC_WEBHOOK_SECRET}
      # SMTP (reset senha, notificações)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      # Autentique (assinatura digital — preferida)
      AUTENTIQUE_TOKEN: ${AUTENTIQUE_TOKEN}
      AUTENTIQUE_SANDBOX: ${AUTENTIQUE_SANDBOX}
      AUTENTIQUE_WEBHOOK_SECRET: ${AUTENTIQUE_WEBHOOK_SECRET}
      # ClickSign (assinatura — fallback opcional)
      CLICKSIGN_TOKEN: ${CLICKSIGN_TOKEN}
      # Anthropic (OCR)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # S3 (uploads)
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      # Cron compartilhado entre app e scheduler (#78).
      CRON_SECRET: ${CRON_SECRET}
      TZ: America/Sao_Paulo
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [cestacorp]

  # Scheduler interno (#78) — dispara os crons (régua, aniversários, expurgo).
  # Roda como serviço separado pra não competir CPU/memória com o app web.
  # Bate nos endpoints HTTP do app via rede interna `cestacorp`.
  scheduler:
    build: .
    container_name: cestacorp-scheduler
    restart: unless-stopped
    command: ["node", "scripts/run-scheduler.js"]
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_BASE_URL: ${SCHEDULER_BASE_URL:-http://app:3000}
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      app:
        condition: service_healthy
    networks: [cestacorp]

  postgres:
    image: postgres:16-alpine
    container_name: cestacorp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cestacorp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cestacorp}
      POSTGRES_DB: ${POSTGRES_DB:-cestacorp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cestacorp} -d ${POSTGRES_DB:-cestacorp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [cestacorp]

  mongo:
    image: mongo:7
    container_name: cestacorp-mongo
    restart: unless-stopped
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"
    networks: [cestacorp]

volumes:
  pgdata:
  mongodata:

networks:
  cestacorp:
    driver: bridge
