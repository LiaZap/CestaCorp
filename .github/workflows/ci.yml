name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    name: Lint + Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cestacorp
          POSTGRES_PASSWORD: cestacorp
          POSTGRES_DB: cestacorp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports: ["27017:27017"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate (test DB)
        env:
          DATABASE_URL: postgresql://cestacorp:cestacorp@localhost:5432/cestacorp_test?schema=public
        run: npx prisma db push --accept-data-loss

      - name: Lint
        run: npm run lint || true

      - name: Build
        env:
          DATABASE_URL: postgresql://cestacorp:cestacorp@localhost:5432/cestacorp_test?schema=public
          MONGODB_URI: mongodb://localhost:27017/cestacorp_test
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-test-secret-00000000000000000000000000000000
        run: npm run build

  e2e:
    name: Playwright E2E
    needs: lint-build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cestacorp
          POSTGRES_PASSWORD: cestacorp
          POSTGRES_DB: cestacorp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongo:
        image: mongo:7
        ports: ["27017:27017"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Prisma generate + push
        env:
          DATABASE_URL: postgresql://cestacorp:cestacorp@localhost:5432/cestacorp_test?schema=public
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss

      - name: Seed
        env:
          DATABASE_URL: postgresql://cestacorp:cestacorp@localhost:5432/cestacorp_test?schema=public
          MONGODB_URI: mongodb://localhost:27017/cestacorp_test
        run: npm run seed

      - name: Run E2E
        env:
          DATABASE_URL: postgresql://cestacorp:cestacorp@localhost:5432/cestacorp_test?schema=public
          MONGODB_URI: mongodb://localhost:27017/cestacorp_test
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-test-secret-00000000000000000000000000000000
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
